                            transition={{ delay: 0.8 + index * 0.1 }}
                            className="bento-card p-6 text-center"
                        >
                            <div className={`text-3xl mb-2 ${stat.color === 'cyan' ? 'text-cyan-400' : stat.color === 'pink' ? 'text-pink-400' : stat.color === 'green' ? 'text-green-400' : 'text-yellow-400'}`}>
                                <i className={`fa-solid ${stat.icon}`}></i>
                            </div>
                            <div className="text-2xl sm:text-3xl font-bold text-white mb-1">{stat.value}</div>
                            <div className="text-gray-400 text-sm">{stat.label}</div>
                        </motion.div>
                    ))}
                </motion.section>
            );
        }
        
        // 时间线
        function TimelineSection() {
            return (
                <motion.section 
                    initial={{ opacity: 0, y: 20 }}
                    animate={{ opacity: 1, y: 0 }}
                    transition={{ delay: 0.9 }}
                    className="bento-card p-6"
                >
                    <h3 className="text-xl font-bold text-cyan-400 mb-6 flex items-center gap-2">
                        <i className="fa-solid fa-timeline"></i>
                        春节八日时间线
                    </h3>
                    
                    <div className="relative">
                        <div className="absolute left-4 top-0 bottom-0 w-0.5 timeline-line"></div>
                        
                        <div className="space-y-4">
                            {timelineEvents.map((item, index) => (
                                <motion.div 
                                    key={item.date}
                                    initial={{ opacity: 0, x: -20 }}
                                    animate={{ opacity: 1, x: 0 }}
                                    transition={{ delay: 1 + index * 0.1 }}
                                    className="relative pl-10"
                                >
                                    <div className="absolute left-2 top-1 w-4 h-4 rounded-full bg-gradient-to-r from-cyan-400 to-pink-400 border-2 border-gray-900"></div>

                                        <span className="tag text-xs">{item.date}</span>
                                        <span className="tag tag-pink text-xs">{item.day}</span>
                                        <div className="flex flex-wrap gap-2 mt-2 w-full">
                                            {item.events.map((event, i) => (
                                                <span key={i} className="text-gray-300 text-sm">• {event}</span>
                                            ))}
                                        </div>
                                    </div>
                                </motion.div>
                            ))}
                        </div>
                    </div>
                </motion.section>
            );
        }
        
        // 话题卡片网格
        function TopicsSection() {
            const [filter, setFilter] = useState('all');
            
            const filteredTopics = filter === 'all' ? topics : 
                filter === 'hot' ? topics.filter(t => t.heat >= 85) :
                topics.filter(t => t.heat < 85);
            
            return (
                <motion.section
                    initial={{ opacity: 0, y: 20 }}
                    animate={{ opacity: 1, y: 0 }}
                    transition={{ delay: 1.2 }}
                >
                    <div className="flex flex-wrap items-center justify-between gap-4 mb-6">
                        <h3 className="text-2xl font-bold text-cyan-400 flex items-center gap-2">
                            <i className="fa-solid fa-fire-flame-curved"></i>
                            春节热门话题 (24个)
                        </h3>
                        
                        <div className="flex gap-2">
                            <button 
                                onClick={() => setFilter('all')}
                                className={`px-4 py-2 rounded-full text-sm font-medium transition-all ${filter === 'all' ? 'bg-cyan-500/20 text-cyan-400 border border-cyan-500/50' : 'bg-gray-800 text-gray-400 border border-gray-700'}`}
                            >
                                全部
                            </button>
                            <button 
                                onClick={() => setFilter('hot')}
                                className={`px-4 py-2 rounded-full text-sm font-medium transition-all ${filter === 'hot' ? 'bg-pink-500/20 text-pink-400 border border-pink-500/50' : 'bg-gray-800 text-gray-400 border border-gray-700'}`}
                            >
                                🔥 爆款
                            </button>
                            <button 
                                onClick={() => setFilter('normal')}
                                className={`px-4 py-2 rounded-full text-sm font-medium transition-all ${filter === 'normal' ? 'bg-green-500/20 text-green-400 border border-green-500/50' : 'bg-gray-800 text-gray-400 border border-gray-700'}`}
                            >
                                热议
                            </button>
                        </div>
                    </div>
                    
                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
                        <AnimatePresence mode="popLayout">
                            {filteredTopics.map((topic, index) => (
                                <motion.div
                                    key={topic.id}
                                    layout
                                    initial={{ opacity: 0, scale: 0.8 }}
                                    animate={{ opacity: 1, scale: 1 }}
                                    exit={{ opacity: 0, scale: 0.8 }}
                                    transition={{ delay: index * 0.05 }}
                                    className="bento-card p-5 cursor-pointer group"
                                >
                                    <div className="flex items-start justify-between mb-3">
                                        <div className={`w-10 h-10 rounded-xl flex items-center justify-center ${topic.color === 'pink' ? 'bg-pink-500/20 text-pink-400' : topic.color === 'cyan' ? 'bg-cyan-500/20 text-cyan-400' : topic.color === 'green' ? 'bg-green-500/20 text-green-400' : 'bg-yellow-500/20 text-yellow-400'}`}>
                                            <i className={`fa-solid ${topic.icon}`}></i>
                                        </div>
                                        <div className="flex items-center gap-1 text-xs">
                                            <i className="fa-solid fa-fire text-orange-400"></i>
                                            <span className={topic.heat >= 90 ? 'text-red-400 font-bold' : topic.heat >= 80 ? 'text-orange-400' : 'text-yellow-400'}>
                                                {topic.heat}
                                            </span>
                                        </div>
                                    </div>
                                    
                                    <h4 className="font-bold text-white mb-2 group-hover:text-cyan-400 transition-colors">
                                        {topic.title}
                                    </h4>
                                    
                                    <p className="text-gray-400 text-sm mb-3 line-clamp-2">
                                        {topic.desc}
                                    </p>
                                    
                                    <div className="flex flex-wrap gap-1">
                                        {topic.highlights.slice(0, 2).map((h, i) => (
                                            <span key={i} className="text-xs px-2 py-1 rounded bg-gray-800 text-gray-400">
                                                {h}
                                            </span>
                                        ))}
                                    </div>
                                </motion.div>
                            ))}
                        </AnimatePresence>
                    </div>
                </motion.section>
            );
        }
        
        // 活跃用户
        function ActiveUsersSection() {
            return (
                <div className="bento-card p-6">
                    <h3 className="text-xl font-bold text-pink-400 mb-6 flex items-center gap-2">
                        <i className="fa-solid fa-crown"></i>
                        话痨TOP榜单
                    </h3>
                    
                    <div className="space-y-4">
                        {activeUsers.map((user, index) => (
                            <motion.div 
                                key={user.rank}
                                initial={{ opacity: 0, x: -20 }}
                                animate={{ opacity: 1, x: 0 }}
                                transition={{ delay: 1.5 + index * 0.1 }}
                                className="flex items-center gap-4 p-3 rounded-xl bg-gray-800/50 hover:bg-gray-800 transition-colors"
                            >
                                <div className={`w-8 h-8 rounded-full flex items-center justify-center font-bold ${user.rank <= 3 ? 'bg-gradient-to-r from-cyan-400 to-pink-400 text-gray-900' : 'bg-gray-700 text-gray-400'}`}>

                                    <div className="flex flex-wrap gap-1 mt-1">
                                        {user.tags.slice(0, 2).map((tag, i) => (
                                            <span key={i} className="text-xs px-2 py-0.5 rounded-full bg-gray-700 text-gray-400">

                                        ))}
                                    </div>
                                </div>
                                
                                <div className="text-right">
                                    <div className="text-lg font-bold text-cyan-400">{user.messages}</div>
                                    <div className="text-xs text-gray-500">条消息</div>
                                </div>
                            </motion.div>
                        ))}
                    </div>
                </div>
            );
        }
        
        // 金句
        function GoldenQuotesSection() {
            return (
                <div className="bento-card p-6">
                    <h3 className="text-xl font-bold text-yellow-400 mb-6 flex items-center gap-2">

            return (
                <div className="bento-card p-6">

                    </h3>
                    
                    <div className="space-y-4">

                            <span className="text-gray-400">总消息数</span>

                    </div>
                    
                    <div className="mt-6 p-4 rounded-xl bg-gradient-to-r from-cyan-500/10 to-pink-500/10 border border-cyan-500/20">
                        <div className="text-sm text-gray-400 mb-2">消息活跃度</div>
                        <div className="h-3 bg-gray-800 rounded-full overflow-hidden">
                            <motion.div 
                                initial={{ width: 0 }}
                                animate={{ width: '85%' }}
                                transition={{ delay: 2.5, duration: 1 }}

                        </div>
                        <div className="text-right text-xs text-cyan-400 mt-1">85% 较上周提升</div>
                    </div>
                </div>
            );

        // 热门表情

                <div className="bento-card p-6">
                    <h3 className="text-xl font-bold text-green-400 mb-6 flex items-center gap-2">

                    <div className="mt-6 p-4 rounded-xl bg-gray-800/50 text-center">

                        <div className="text-gray-500 text-sm">本群年度吉祥物</div>

                        </motion.div>

                            whileHover={{ scale: 1.02 }}

                        >

                                <span className="text-3xl">✈️</span>

                                    <div className="text-cyan-400 text-sm">泰国度蜜月</div>
                                </div>
                            </div>
                            <p className="text-gray-400 text-sm">金华偷偷去泰国度蜜月，群友调侃看人妖</p>
                        </motion.div>
                        
                        <motion.div 
                            whileHover={{ scale: 1.02 }}

                        >

                        </motion.div>
                        
                        <motion.div 
                            whileHover={{ scale: 1.02 }}

                        >
                            <div className="flex items-center gap-3 mb-2">
                                <span className="text-3xl">🏆</span>
                                <div>
                                    <div className="font-bold text-white">本群</div>
                                    <div className="text-yellow-400 text-sm">春节活跃度创新高</div>
                                </div>
                            </div>
                            <p className="text-gray-400 text-sm">春节期间消息量突破15000条，创历史新高！</p>
                        </motion.div>
                    </div>
                </motion.section>
            );
        }
        
        // 程序员专属
        function ProgrammerSection() {
            return (
                <motion.section
                    initial={{ opacity: 0, y: 20 }}
                    animate={{ opacity: 1, y: 0 }}
                    transition={{ delay: 3.2 }}
                    className="bento-card p-6"
                >
                    <h3 className="text-xl font-bold text-cyan-400 mb-6 flex items-center gap-2">
                        <i className="fa-solid fa-code"></i>

                            </ul>

                        <div className="p-4 rounded-xl bg-gray-800/50 border border-gray-700">
                            <div className="text-2xl mb-2">💻</div>

                    <div className="mt-6 p-4 rounded-xl bg-gradient-to-r from-cyan-500/10 to-pink-500/10 border border-cyan-500/20">
                        <div className="flex items-center gap-2 mb-2">

if (newYear === true && bugs === false) {

            return (

                    initial={{ opacity: 0 }}
